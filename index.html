<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scroll Imágenes y Texto</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="panels-container">
  <section class="panel" data-img="foto 1.jpeg">
    <div class="panel-content">
      <h1>Sección 1</h1>
      <p>Descripción de la sección 1</p>
    </div>
    <img class="panel-img" src="foto 1.jpeg" alt="">
  </section>

  <section class="panel" data-img="foto 2.jpeg">
    <div class="panel-content">
      <h1>Sección 2</h1>
      <p>Descripción de la sección 2</p>
    </div>
    <img class="panel-img" src="foto 2.jpeg" alt="">
  </section>

  <section class="panel" data-img="foto 3.jpeg">
    <div class="panel-content">
      <h1>Sección 3</h1>
      <p>Descripción de la sección 3</p>
    </div>
    <img class="panel-img" src="foto 3.jpeg" alt="">
  </section>
</div>

<script src="script.js"></script>
</body>
</html>
